events {
    worker_connections 1024;
}

http {
    upstream babblebeaver {
        server babblebeaver:8000;
    }
    
    upstream bb-agent-manager {
        server bb-agent-manager:8000;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # BabbleBeaver routes
        location / {
            proxy_pass http://babblebeaver;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # BB Agent Manager routes
        location /agent/ {
            proxy_pass http://bb-agent-manager/agent/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Direct access to agent health and docs
        location /agent-health {
            proxy_pass http://bb-agent-manager/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /agent-docs {
            proxy_pass http://bb-agent-manager/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
