version: '3.8'

services:
  buildly-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildly-agent-manager
    stdin_open: true
    tty: true
    environment:
      - LABS_BASE_URL=https://labs-api.buildly.io
      - BUILDLY_ENV_NAME=local
      - BUILDLY_PRODUCT_UUID=
      - BUILDLY_ORG_UUID=
      - LABS_API_TOKEN=
    volumes:
      - ./devdocs:/app/devdocs
      - ./buildly_memory:/app/buildly_memory
    command: python mcp_server_stdio.py
    restart: unless-stopped

networks:
  default:
    name: bb-agent-network

