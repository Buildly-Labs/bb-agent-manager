version: '3.8'

services:
  buildly-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildly-agent-manager
    stdin_open: true
    tty: true
    environment:
      - LABS_BASE_URL=https://labs-api.buildly.io
    volumes:
      - ./devdocs:/app/devdocs
    command: python3 buildly_mcp_server.py
    restart: unless-stopped

networks:
  default:
    name: bb-agent-network

