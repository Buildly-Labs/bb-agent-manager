name: Code Review and Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  # Automated code quality checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint black isort mypy
      
      - name: Run Black formatter check
        run: black --check .
        continue-on-error: true
      
      - name: Run isort import check
        run: isort --check-only .
        continue-on-error: true
      
      - name: Run Pylint
        run: pylint bb_agent_manager/ --fail-under=7.0
        continue-on-error: true
      
      - name: Run type checking with mypy
        run: mypy bb_agent_manager/ --ignore-missing-imports
        continue-on-error: true
  
  # Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest
        run: pytest tests/ -v --cov=bb_agent_manager --cov-report=xml --cov-report=term
        continue-on-error: false
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  
  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r bb_agent_manager/ -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
  
  # AI-generated code review check
  ai-code-review:
    name: AI Code Review Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check for AI-generated label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasAILabel = labels.includes('ai-generated');
            
            if (hasAILabel) {
              // Add comment requiring human review
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: '⚠️ **AI-Generated Code Detected**\n\nThis PR contains AI-generated code and requires thorough human review before merging.\n\n**Review Checklist:**\n- [ ] Code logic is correct and follows best practices\n- [ ] No security vulnerabilities introduced\n- [ ] Tests are comprehensive and pass\n- [ ] Documentation is accurate and complete\n- [ ] No sensitive data or credentials exposed'
              });
              
              // Request review from code owners
              const codeOwners = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'CODEOWNERS'
              }).catch(() => null);
              
              if (codeOwners) {
                core.info('CODEOWNERS file found - reviews will be automatically requested');
              }
            }
  
  # Prevent auto-merge of AI-generated PRs
  block-auto-merge:
    name: Block Auto-Merge for AI PRs
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ai-generated')
    steps:
      - name: Disable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              auto_merge: null
            });
            
            core.info('Auto-merge disabled for AI-generated PR - requires human review');
  
  # Comment on PR with check results
  pr-comment:
    name: PR Status Comment
    runs-on: ubuntu-latest
    needs: [code-quality, test, security]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post status comment
        uses: actions/github-script@v7
        with:
          script: |
            const codeQuality = '${{ needs.code-quality.result }}';
            const tests = '${{ needs.test.result }}';
            const security = '${{ needs.security.result }}';
            
            const statusEmoji = (status) => status === 'success' ? '✅' : status === 'failure' ? '❌' : '⚠️';
            
            const comment = `## 🤖 Automated Check Results
            
            | Check | Status |
            |-------|--------|
            | Code Quality | ${statusEmoji(codeQuality)} ${codeQuality} |
            | Tests | ${statusEmoji(tests)} ${tests} |
            | Security | ${statusEmoji(security)} ${security} |
            
            ${tests !== 'success' ? '⚠️ **Tests must pass before merging**' : ''}
            ${context.payload.pull_request.draft ? '📝 **This is a draft PR - mark as ready for review when complete**' : ''}
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
